version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
      - "9000:9000"
    environment:
      - PORT=5000
      - S3_PORT=9000
      - DB_STORAGE_PATH=/app/data/database.sqlite
      - JWT_SECRET=docker_compose_super_secret_media_locker
    volumes:
      - backend-data:/app/data
      - s3-storage:/app/s3-storage

volumes:
  backend-data:
  s3-storage:
